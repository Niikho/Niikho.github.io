<!DOCTYPE html>
<html>

<head>
    <title>Пароль</title>
</head>

<body>
    <script>
        function checkPassword() {
            var elem = document.getElementById('passwordBox');
            var password = elem.value;
            if (password == "2210") { return true; }
            else {
                alert("пароль не верен");
                return false;
            }
        }

    </script>
    <p>Для входа введите пароль:</p>
    <P><input id="passwordBox" type="password"></P>
    <P><a href="https://ya.ru" onclick="return checkPassword();">Яндекс</a></P>

</body>

</html>
